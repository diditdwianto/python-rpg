<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Knight - Cookie RPG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            color: #000000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            border: 2px solid #000;
            padding: 20px;
            max-width: 700px;
            width: 100%;
            background: #fff;
        }
        .section {
            border: 1px solid #000;
            padding: 10px;
            margin: 10px 0;
        }
        .currencies {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }
        .currency { display: flex; align-items: center; gap: 8px; }
        .currency i { width: 20px; text-align: center; }
        .game-area {
            height: 220px;
            position: relative;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-canvas {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            line-height: 1.2;
            white-space: pre;
            background: #fff;
            padding: 10px;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .stat i { width: 18px; }
        .equipment {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .equip-slot {
            border: 1px solid #000;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
        }
        .equip-slot .slot-name { color: #666; }
        .equip-slot .item-name { color: #000; }
        .equip-slot .item-name.empty { color: #ccc; }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            background: #fff;
            color: #000;
            border: 2px solid #000;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #000; color: #fff; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            border: 2px solid #000;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        .close-btn {
            background: none;
            border: none;
            color: #000;
            font-size: 24px;
            cursor: pointer;
        }
        .shop-item, .inventory-item, .quest-item {
            border: 1px solid #000;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shop-item:hover, .inventory-item:hover { background: #f0f0f0; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; }
        .item-slot { font-size: 12px; color: #666; }
        .item-stats { font-size: 12px; color: #333; }
        .item-cost { font-size: 12px; color: #000; font-weight: bold; }
        .btn-small { padding: 5px 10px; font-size: 12px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { padding: 5px 15px; cursor: pointer; border: 1px solid #000; font-weight: bold; }
        .tab.active { background: #000; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .controls-hint { text-align: center; font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="section currencies">
            <div class="currency"><i class="fa-solid fa-cookie"></i><span>Cookie:</span><span id="cookie-count">0</span></div>
            <div class="currency"><i class="fa-solid fa-pepper-hot"></i><span>Sausage:</span><span id="sausage-count">0</span></div>
            <div class="currency"><i class="fa-solid fa-bread-slice"></i><span>Bread:</span><span id="bread-count">0</span></div>
            <div class="currency"><i class="fa-solid fa-coins"></i><span>Gold:</span><span id="gold-count">0</span></div>
        </div>
        <div class="section game-area"><div id="game-canvas"></div></div>
        <div class="controls-hint">Use Arrow Keys to move</div>
        <div class="section stats">
            <div class="stat"><i class="fa-solid fa-heart"></i><span>HP:</span><span id="hp">100</span></div>
            <div class="stat"><i class="fa-solid fa-droplet"></i><span>MP:</span><span id="mp">50</span></div>
            <div class="stat"><i class="fa-solid fa-khanda"></i><span>DMG:</span><span id="damage">10</span></div>
            <div class="stat"><i class="fa-solid fa-shield"></i><span>DEF:</span><span id="defense">5</span></div>
        </div>
        <div class="section equipment">
            <div class="equip-slot"><span class="slot-name">Helmet:</span><span id="eq-helmet" class="item-name empty">None</span></div>
            <div class="equip-slot"><span class="slot-name">Armor:</span><span id="eq-armor" class="item-name empty">None</span></div>
            <div class="equip-slot"><span class="slot-name">Weapon:</span><span id="eq-weapon" class="item-name empty">None</span></div>
            <div class="equip-slot"><span class="slot-name">Shield:</span><span id="eq-shield" class="item-name empty">None</span></div>
            <div class="equip-slot"><span class="slot-name">Boots:</span><span id="eq-boots" class="item-name empty">None</span></div>
            <div class="equip-slot"><span class="slot-name">Accessory:</span><span id="eq-accessory" class="item-name empty">None</span></div>
        </div>
        <div class="section actions">
            <button class="btn" id="btn-shop">Shop</button>
            <button class="btn" id="btn-inventory">Inventory</button>
            <button class="btn" id="btn-quests">Quests</button>
            <button class="btn" id="btn-save">Save</button>
        </div>
    </div>

    <div class="modal" id="shop-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Shop</h2><button class="close-btn" id="close-shop">&times;</button></div>
            <div id="shop-items"></div>
        </div>
    </div>

    <div class="modal" id="inventory-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Inventory</h2><button class="close-btn" id="close-inventory">&times;</button></div>
            <div class="tabs">
                <div class="tab active" data-tab="inventory-list">Items</div>
                <div class="tab" data-tab="equipped-list">Equipped</div>
            </div>
            <div id="inventory-list" class="tab-content active"></div>
            <div id="equipped-list" class="tab-content"></div>
        </div>
    </div>

    <div class="modal" id="quests-modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Quests</h2><button class="close-btn" id="close-quests">&times;</button></div>
            <div id="quest-list"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8085/api';
        const GW = 20;
        const GH = 10;
        const SPRITE = ['  O  ', ' /|\\ ', ' / \\ '];

        let state = {
            currencies: { cookie: 0, sausage: 0, bread: 0, gold: 0 },
            stats: { hp: 100, mp: 50, damage: 10, defense: 5 },
            position: { x: 8, y: 4 },
            equipment: { helmet: null, armor: null, weapon: null, shield: null, boots: null, accessory: null },
            inventory: []
        };

        const ITEMS = {
            wooden_sword: { name: 'Wooden Sword', slot: 'weapon', stats: { damage: 5 } },
            iron_sword: { name: 'Iron Sword', slot: 'weapon', stats: { damage: 15 } },
            steel_sword: { name: 'Steel Sword', slot: 'weapon', stats: { damage: 30 } },
            leather_cap: { name: 'Leather Cap', slot: 'helmet', stats: { hp: 10 } },
            iron_helmet: { name: 'Iron Helmet', slot: 'helmet', stats: { hp: 25, defense: 3 } },
            leather_armor: { name: 'Leather Armor', slot: 'armor', stats: { hp: 20, defense: 2 } },
            chainmail: { name: 'Chainmail', slot: 'armor', stats: { hp: 50, defense: 5 } },
            wooden_shield: { name: 'Wooden Shield', slot: 'shield', stats: { defense: 3, hp: 10 } },
            iron_shield: { name: 'Iron Shield', slot: 'shield', stats: { defense: 8, hp: 25 } },
            speed_boots: { name: 'Speed Boots', slot: 'boots', stats: { hp: 15 } },
            health_boots: { name: 'Health Boots', slot: 'boots', stats: { hp: 40 } },
            mana_ring: { name: 'Mana Ring', slot: 'accessory', stats: { mp: 30, damage: 3 } },
            power_amulet: { name: 'Power Amulet', slot: 'accessory', stats: { damage: 10, mp: 20 } }
        };

        const PRICES = {
            wooden_sword: { cookie: 50 }, iron_sword: { cookie: 200 }, steel_sword: { cookie: 500 },
            leather_cap: { cookie: 30 }, iron_helmet: { cookie: 100 },
            leather_armor: { cookie: 60 }, chainmail: { cookie: 250 },
            wooden_shield: { cookie: 40 }, iron_shield: { cookie: 180 },
            speed_boots: { cookie: 70 }, health_boots: { cookie: 150 },
            mana_ring: { cookie: 120 }, power_amulet: { cookie: 300 }
        };

        function el(id) { return document.getElementById(id); }

        function render() {
            const canvas = el('game-canvas');
            if (!canvas) return;
            let grid = [];
            for (let y = 0; y < GH; y++) grid.push(Array(GW).fill(' . '));
            let px = state.position.x || 8;
            let py = state.position.y || 4;
            for (let i = 0; i < SPRITE.length; i++) {
                let row = SPRITE[i];
                for (let j = 0; j < row.length; j++) {
                    let gy = py + i;
                    let gx = px + j;
                    if (gy >= 0 && gy < GH && gx >= 0 && gx < GW) {
                        grid[gy][gx] = row[j];
                    }
                }
            }
            canvas.textContent = grid.map(r => r.join('')).join('\n');
        }

        function updateUI() {
            el('cookie-count').textContent = state.currencies.cookie;
            el('sausage-count').textContent = state.currencies.sausage;
            el('bread-count').textContent = state.currencies.bread;
            el('gold-count').textContent = state.currencies.gold;
            el('hp').textContent = state.stats.hp;
            el('mp').textContent = state.stats.mp;
            el('damage').textContent = state.stats.damage;
            el('defense').textContent = state.stats.defense;
            ['helmet','armor','weapon','shield','boots','accessory'].forEach(slot => {
                let e = el('eq-' + slot);
                let id = state.equipment[slot];
                if (id && ITEMS[id]) {
                    e.textContent = ITEMS[id].name;
                    e.classList.remove('empty');
                } else {
                    e.textContent = 'None';
                    e.classList.add('empty');
                }
            });
        }

        async function load() {
            try {
                let res = await fetch(API + '/state');
                if (res.ok) state = await res.json();
            } catch (e) { console.log('offline'); }
            if (!state.position) state.position = { x: 8, y: 4 };
            updateUI();
            render();
        }

        async function move(dx, dy) {
            let nx = (state.position.x || 0) + dx;
            let ny = (state.position.y || 0) + dy;
            if (nx >= 0 && nx < GW && ny >= 0 && ny < GH) {
                state.position.x = nx;
                state.position.y = ny;
                render();
                try { await fetch(API + '/move', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({dx, dy}) }); } catch(e) {}
            }
        }

        async function addCurr(type, amt) {
            state.currencies[type] = (state.currencies[type] || 0) + amt;
            updateUI();
            try { await fetch(API + '/add_currency', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({currency: type, amount: amt}) }); } catch(e) {}
        }

        async function openShop() {
            try {
                let res = await fetch(API + '/shop');
                let shop = await res.json();
                let container = el('shop-items');
                container.innerHTML = '';
                shop.forEach(function(item) {
                    let price = Object.entries(PRICES[item.id] || {}).map(function(e) { return e[1] + ' ' + e[0]; }).join(', ');
                    let stats = Object.entries(item.stats).map(function(e) { return '+' + e[1] + ' ' + e[0]; }).join(', ');
                    let div = document.createElement('div');
                    div.className = 'shop-item';
                    div.innerHTML = '<div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-slot">' + item.slot + '</div><div class="item-stats">' + stats + '</div><div class="item-cost">Price: ' + price + '</div></div><button class="btn btn-small" id="buy-' + item.id + '">Buy</button>';
                    container.appendChild(div);
                    el('buy-' + item.id).onclick = (function(id) { return function() { buy(id); }; })(item.id);
                });
                el('shop-modal').classList.add('active');
            } catch(e) { alert('Server offline'); }
        }

        async function buy(id) {
            try {
                let res = await fetch(API + '/buy', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({itemId: id}) });
                let result = await res.json();
                if (result.status === 'success') { state = result.state; updateUI(); alert('Purchased!'); }
                else alert(result.message);
            } catch(e) { alert('Server offline'); }
        }

        async function openInventory() {
            let invList = el('inventory-list');
            invList.innerHTML = '';
            if (!state.inventory || state.inventory.length === 0) invList.innerHTML = '<p>No items</p>';
            else state.inventory.forEach(function(id) {
                let item = ITEMS[id];
                if (!item) return;
                let stats = Object.entries(item.stats).map(function(e) { return '+' + e[1] + ' ' + e[0]; }).join(', ');
                let div = document.createElement('div');
                div.className = 'inventory-item';
                div.innerHTML = '<div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-slot">' + item.slot + '</div><div class="item-stats">' + stats + '</div></div><button class="btn btn-small" id="equip-' + id + '">Equip</button>';
                invList.appendChild(div);
                el('equip-' + id).onclick = (function(i) { return function() { equip(i); }; })(id);
            });
            let eqList = el('equipped-list');
            eqList.innerHTML = '';
            Object.entries(state.equipment).forEach(function(entry) {
                let slot = entry[0];
                let id = entry[1];
                let item = id ? ITEMS[id] : null;
                let div = document.createElement('div');
                div.className = 'inventory-item';
                let content = '<div class="item-info"><div class="item-name">' + slot.charAt(0).toUpperCase() + slot.slice(1) + ': ' + (item ? item.name : 'Empty') + '</div></div>';
                if (item) content += '<button class="btn btn-small" id="unequip-' + slot + '">Unequip</button>';
                div.innerHTML = content;
                eqList.appendChild(div);
                if (item) el('unequip-' + slot).onclick = (function(s) { return function() { unequip(s); }; })(slot);
            });
            el('inventory-modal').classList.add('active');
        }

        async function equip(id) {
            let item = ITEMS[id];
            if (!item) return;
            try {
                let res = await fetch(API + '/equip', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({slot: item.slot, itemId: id}) });
                let result = await res.json();
                if (result.status === 'success') { state = result.state; updateUI(); openInventory(); }
            } catch(e) { alert('Server offline'); }
        }

        async function unequip(slot) {
            try {
                let res = await fetch(API + '/equip', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({slot: slot, itemId: null}) });
                let result = await res.json();
                if (result.status === 'success') { state = result.state; updateUI(); openInventory(); }
            } catch(e) { alert('Server offline'); }
        }

        async function openQuests() {
            try {
                let res = await fetch(API + '/quests');
                let quests = await res.json();
                let container = el('quest-list');
                container.innerHTML = '';
                quests.forEach(function(q) {
                    let reward = Object.entries(q.reward).map(function(e) { return e[1] + ' ' + e[0]; }).join(', ');
                    let div = document.createElement('div');
                    div.className = 'quest-item';
                    div.innerHTML = '<div class="item-info"><div class="item-name">' + q.name + '</div><div class="item-stats">' + q.description + '</div><div class="item-cost">Reward: ' + reward + '</div></div>';
                    container.appendChild(div);
                });
                el('quests-modal').classList.add('active');
            } catch(e) { alert('Server offline'); }
        }

        async function save() {
            try {
                await fetch(API + '/state', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(state) });
                alert('Saved!');
            } catch(e) { alert('Server offline'); }
        }

        function closeModal(id) { el(id).classList.remove('active'); }

        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
            document.querySelector('[data-tab="' + id + '"]').classList.add('active');
            el(id).classList.add('active');
        }

        el('btn-shop').onclick = openShop;
        el('btn-inventory').onclick = openInventory;
        el('btn-quests').onclick = openQuests;
        el('btn-save').onclick = save;
        el('close-shop').onclick = function() { closeModal('shop-modal'); };
        el('close-inventory').onclick = function() { closeModal('inventory-modal'); };
        el('close-quests').onclick = function() { closeModal('quests-modal'); };

        document.querySelectorAll('.modal').forEach(function(m) { m.addEventListener('click', function(e) { if (e.target === m) closeModal(m.id); }); });
        document.querySelectorAll('.tab').forEach(function(t) { t.addEventListener('click', function() { switchTab(t.dataset.tab); }); });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') { e.preventDefault(); move(0, -1); }
            else if (e.key === 'ArrowDown') { e.preventDefault(); move(0, 1); }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1, 0); }
            else if (e.key === 'ArrowRight') { e.preventDefault(); move(1, 0); }
        });

        setInterval(function() { addCurr('cookie', 1); }, 2000);

        load();
    </script>
</body>
</html>
